services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
  frontend:
    image: node:22-alpine
    working_dir: /app/frontend
    volumes:
      - .:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      - backend
